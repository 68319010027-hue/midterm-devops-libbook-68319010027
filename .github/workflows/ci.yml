name: CI - libbook

on:
  push:
    branches: [ "main", "develop", "feature/*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Run Backend Tests
      run: |
        cd backend
        npm install
        npm test
        
    - name: Test Build Backend Docker Image
      run: docker build ./backend -t test-backend

    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Test Build Frontend Docker Image
      run: docker build ./frontend -t test-frontend

    - name: Push Frontend Image to Docker Hub
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag test-frontend ${{ secrets.DOCKERHUB_USERNAME }}/libbook-web:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/libbook-web:latest